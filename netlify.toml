[build]
  publish = "."

[[headers]]
  for = "/public/data/episodes.json"
  [headers.values]
    Cache-Control = "public, max-age=60"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
