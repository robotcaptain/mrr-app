server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types application/json text/css application/javascript text/javascript;
    gzip_min_length 1024;

    # Security headers (server-wide so all locations inherit them)
    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";

    # Cache episode data for 1 day
    location = /public/data/episodes.json {
        add_header Cache-Control "public, max-age=86400";
    }

    # No-cache for version check and service worker
    location = /public/data/episodes-version.json {
        add_header Cache-Control "no-cache";
    }
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
