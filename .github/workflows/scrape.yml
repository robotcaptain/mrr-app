name: Scrape new episodes

on:
  schedule:
    - cron: '0 10 * * 2'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run scraper
        run: node scripts/scrape.mjs
      - name: Commit and push if episodes.json changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/episodes.json public/data/episodes-version.json
          if git diff --cached --quiet; then
            echo "No new episodes."
          else
            git commit -m "chore: scrape new episodes [skip ci]"
            git push
          fi

