<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MRR Radio">
  <meta name="theme-color" content="#0a0a0a">
  <title>MRR Radio</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <!-- Fixed header -->
  <header id="app-header">
    <h1 class="app-title">MRR RADIO</h1>
    <div class="header-right">
      <span id="last-updated" class="last-updated"></span>
      <button id="sync-btn" class="icon-btn" title="Sync new episodes" aria-label="Sync new episodes">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"></polyline>
          <polyline points="1 20 1 14 7 14"></polyline>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
        </svg>
      </button>
    </div>
  </header>

  <!-- Sticky filter bar -->
  <div id="filter-bar">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input
        type="search"
        id="search-input"
        placeholder="Search artists or songs..."
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      >
      <button id="search-clear" class="search-clear" hidden aria-label="Clear search">✕</button>
    </div>
    <div class="filter-row">
      <select id="host-filter" aria-label="Filter by host">
        <option value="">All Hosts</option>
      </select>
      <select id="year-filter" aria-label="Filter by year">
        <option value="">All Years</option>
      </select>
    </div>
  </div>

  <!-- Main content area -->
  <main id="app-main">
    <!-- Loading state -->
    <div id="loading-view" class="status-view">
      <div class="loading-spinner"></div>
      <p id="loading-msg">Loading episodes...</p>
    </div>

    <!-- Empty state -->
    <div id="empty-view" class="status-view" hidden>
      <p>No episodes found.</p>
    </div>

    <!-- Episode list -->
    <div id="episode-list" hidden></div>
  </main>

  <!-- Artist view (slides in from right) -->
  <div id="artist-view" class="side-panel" aria-hidden="true">
    <div class="side-panel-header">
      <button id="artist-back-btn" class="back-btn" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <span id="artist-name" class="side-panel-title"></span>
    </div>
    <div id="artist-episode-list"></div>
  </div>

  <!-- Mini player bar -->
  <div id="mini-player" class="mini-player" hidden>
    <div class="mini-player-progress"></div>
    <div class="mini-player-content" id="mini-player-expand">
      <div class="mini-thumb" id="mini-thumb"></div>
      <div class="mini-info">
        <span id="mini-episode-title" class="mini-title"></span>
        <span id="mini-host" class="mini-host"></span>
      </div>
      <button id="mini-play-btn" class="mini-play-btn play-pause-btn" aria-label="Play/Pause">
        <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5 3 19 12 5 21 5 3"></polygon>
        </svg>
        <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="4" width="4" height="16"></rect>
          <rect x="14" y="4" width="4" height="16"></rect>
        </svg>
      </button>
      <button class="mini-expand-btn" aria-label="Expand player">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
      </button>
    </div>
    <input type="range" id="mini-scrubber" class="mini-scrubber" min="0" max="100" value="0" aria-label="Seek">
  </div>

  <!-- Expanded player sheet -->
  <div id="player-sheet" class="player-sheet" aria-hidden="true">
    <div class="sheet-drag-handle"></div>
    <button id="sheet-close-btn" class="sheet-close-btn" aria-label="Close player">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="18 9 12 15 6 9"></polyline>
      </svg>
    </button>

    <div class="sheet-art" id="sheet-art"></div>

    <div class="sheet-info">
      <div class="sheet-episode-num" id="sheet-episode-num"></div>
      <div class="sheet-host" id="sheet-host"></div>
      <div class="sheet-caption" id="sheet-caption"></div>
    </div>

    <div class="scrubber-wrap">
      <input type="range" id="sheet-scrubber" class="sheet-scrubber" min="0" max="100" value="0" aria-label="Seek">
      <div class="time-display">
        <span id="current-time">0:00</span>
        <span id="total-time">0:00</span>
      </div>
    </div>

    <div class="player-controls">
      <button id="skip-back-btn" class="ctrl-btn skip-btn" aria-label="Skip back 15 seconds">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M11.99 5V1l-5 5 5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6h-2c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
        </svg>
        <span class="skip-label">15</span>
      </button>
      <button id="sheet-play-btn" class="ctrl-btn ctrl-btn--play play-pause-btn" aria-label="Play/Pause">
        <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5 3 19 12 5 21 5 3"></polygon>
        </svg>
        <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="4" width="4" height="16"></rect>
          <rect x="14" y="4" width="4" height="16"></rect>
        </svg>
      </button>
      <button id="skip-fwd-btn" class="ctrl-btn skip-btn" aria-label="Skip forward 15 seconds">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M18 13c0 3.31-2.69 6-6 6s-6-2.69-6-6 2.69-6 6-6v4l5-5-5-5v4c-4.42 0-8 3.58-8 8s3.58 8 8 8 8-3.58 8-8h-2z"/>
        </svg>
        <span class="skip-label">15</span>
      </button>
    </div>

    <div class="tracklist-section">
      <div class="tracklist-header">TRACKLIST</div>
      <div id="sheet-tracklist"></div>
    </div>
  </div>

  <!-- Overlay backdrop -->
  <div id="sheet-backdrop" class="sheet-backdrop" hidden></div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
